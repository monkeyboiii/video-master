# Episode manifest — source of truth for this episode.
# Schema notes: docs/production-model.md · naming: docs/naming-conventions.md
# Validate with: node tools/validate.mjs

video_id: "DBX-APP-S01E001" # DBX-{SERIES}-S{ss}E{eee}
slug: "made-for-riders"
series: "app-community"
status: topic # topic|packaging|scripting|shooting|editing|qc|published|retro
# Mid-production: footage shot, VO recorded (see assets), phone overlays rendered
# (outputs), assembly plan in edit-notes.md. Status kept at `topic` only because the
# packaging cover doc isn't written yet; the real work is well past that. Advance +
# add cover.en-US.md when ready to formalize.

formats:
  primary: short_vertical
  aspect: 9x16
  resolution: 1080x1920
  fps: 30

# en-US first. The zh-CN launch cut is a separate pass with its own native hook.
variants:
  en-US:
    script: script.en-US.md
    cover: cover.en-US.md
    subtitles: subtitles/en-US.srt
    remotion_props: remotion-props/en-US.json
    voiceover_asset_id: null # 4 separate takes (see assets.voiceover), not one file
    platforms: [tiktok, ytshorts, reels]

# ~22s launch teaser (as recorded). Two channels: founder VO carries the EMOTION;
# phone overlays + stamps carry the FEATURES (shown, not told). `overlay` names a
# composition (hook-title | phone-language | phone-embed | phone-sponsor | ...) or null;
# the features beat uses three phone overlays, recorded under outputs.overlays.
beats:
  - id: hook
    purpose: pain / identity contrast — the dismissal that stings every rider
    visual_intent: nobody-photo (founder at the paddock), slow push-in; SFX "nobody cares" (⚠ says "car")
    overlay: null
    target_duration_sec:
      en-US: 2.0
  - id: i-do
    purpose: the turn — deadpan vindication
    visual_intent: hard cut to founder (helmet, porch), dead calm; bass-drop on the cut
    overlay: null
    target_duration_sec:
      en-US: 1.5
  - id: pivot
    purpose: belonging + founder mission, compressed
    visual_intent: founder continues; MADE FOR RIDERS title card
    overlay: hook-title
    target_duration_sec:
      en-US: 5.5
  - id: features
    purpose: information-dense proof — three app features shown on a phone over the founder
    visual_intent: founder in bg; keyframed phone overlays cycle language → embed → sponsor, synced to the VO words; stamps SPEAKS YOUR LANGUAGE / DROP ONE LINK / GET SPONSORED
    overlay: null # three phone overlays — see outputs.overlays
    target_duration_sec:
      en-US: 10.0
  - id: cta
    purpose: comment-for-invite-code — the reach engine
    visual_intent: recorded founder clip pointing finger down; no graphic card
    overlay: null
    target_duration_sec:
      en-US: 3.0

