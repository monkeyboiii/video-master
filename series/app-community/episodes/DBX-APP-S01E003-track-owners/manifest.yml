# Episode manifest — source of truth for this episode.
# Schema notes: docs/production-model.md · naming: docs/naming-conventions.md
# Validate with: node tools/validate.mjs

video_id: "DBX-APP-S01E003" # DBX-{SERIES}-S{ss}E{eee}
slug: "track-owners"
series: "app-community"
status: editing # topic|packaging|scripting|shooting|editing|qc|published|retro

formats:
  primary: short_vertical
  aspect: 9x16
  resolution: 1080x1920
  fps: 30

# Track-owner promotion. Narration was recorded first — there is NO authored reading script;
# script.en-US.md is the transcript of record and the .srt files are the subtitles.
# Raw ~58.7s; pause-cropped timeline = 53.61s. Edit plan in storyboard.md.
variants:
  en-US:
    script: script.en-US.md
    cover: cover.en-US.md
    subtitles: subtitles/en-US.srt
    # No single locale props file: this episode renders per-comp / per-beat props
    # (remotion-props/captions.all.json, side-screen.{flair,create,rsvp}.json, ...).
    remotion_props: null
    voiceover_asset_id: null # narration is diegetic in the talking-head clips
    platforms: [tiktok, ytshorts, reels]
  # Literal translation of en-US (human-directed exception to docs/localization.md), over the
  # ORIGINAL ENGLISH AUDIO — no Chinese voiceover, so every timing is identical to en-US.
  # subtitles/zh-CN.srt is bilingual (English line + Chinese line per cue).
  zh-CN:
    script: script.zh-CN.md
    cover: cover.zh-CN.md
    subtitles: subtitles/zh-CN.srt
    # Same per-comp convention as en-US: remotion-props/*.zh-CN.json
    # (captions.all.zh-CN.json, brand-title.zh-CN.json — the rest carry no display text).
    remotion_props: null
    voiceover_asset_id: null # English narration is retained; no zh-CN voiceover exists
    platforms: [rednote, douyin, bilibili]

# One continuous caption overlay spans the whole video, so each beat's `overlay` below
# names that beat's *distinctive* overlay. See storyboard.md.
beats:
  - id: hook
    purpose: name the discovery gap — you can't attend what you never find out about
    visual_intent: founder to camera; slow punch-in; "never/discover" in harsh red
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 15.48
      zh-CN: 15.48 # timings unchanged — English audio is retained
  - id: why
    purpose: why DirtBikeX exists — put tracks where riders already look
    visual_intent: brand-title logo lands on the word "DirtBikeX"
    overlay: brand-title
    target_duration_sec:
      en-US: 7.55
      zh-CN: 7.55 # timings unchanged — English audio is retained
  - id: flair
    purpose: feature 1 — track owners get verified so their updates read as real
    visual_intent: side screen (left blank space) — Edit Profile → flair → Track Stewards
    overlay: side-screen
    target_duration_sec:
      en-US: 5.92
      zh-CN: 5.92 # timings unchanged — English audio is retained
  - id: create
    purpose: feature 2 — create ride days, races, open practices, recurring events
    visual_intent: side screen — New Event form → filled → Recurrence "Every other Wednesday"
    overlay: side-screen
    target_duration_sec:
      en-US: 5.06
      zh-CN: 5.06 # timings unchanged — English audio is retained
  - id: rsvp
    purpose: feature 3 — riders discover in the Events tab, RSVP, get reminded
    visual_intent: side screen — Events tab → detail → (map loading cut) → RSVP → Going
    overlay: side-screen
    target_duration_sec:
      en-US: 7.97
      zh-CN: 7.97 # timings unchanged — English audio is retained
  - id: cta
    purpose: turn it into one action — track owners comment "OWNER" for the link
    visual_intent: profile-card on "My name is Rubio", clears before the CTA words
    overlay: profile-card
    target_duration_sec:
      en-US: 11.63
      zh-CN: 11.63 # timings unchanged — English audio is retained

assets:
  # 6 talking-head clips (HLG HDR, -90 rotation -> portrait) + 3 app screen recordings (SDR).
  # The EDIT uses the enhanced (face-retouched) renders for VIDEO and the original .MOV for
  # AUDIO — verified frame-synced, zero offset. Each .MOV also carries a 4.0 'apac' spatial
  # audio track; map the 48k AAC stream (0:1), not ffmpeg's auto-selected "best".
  raw:
    - {asset_id: RAW_010, filename: 01_1-you-cant.MP4, external_uri: null, sha256: null, notes: "enhanced — VIDEO source for hook"}
    - {asset_id: RAW_011, filename: 02_2-and-thats.MP4, external_uri: null, sha256: null, notes: "enhanced — VIDEO source for why"}
    - {asset_id: RAW_012, filename: 03_3-here.MP4, external_uri: null, sha256: null, notes: "enhanced — VIDEO source for flair"}
    - {asset_id: RAW_013, filename: 04_4-you-can-create.MP4, external_uri: null, sha256: null, notes: "enhanced — VIDEO source for create"}
    - {asset_id: RAW_014, filename: 05_5-then-fellow-riders.MP4, external_uri: null, sha256: null, notes: "enhanced — VIDEO source for rsvp"}
    - {asset_id: RAW_015, filename: 06_6-the-idea.MP4, external_uri: null, sha256: null, notes: "enhanced — VIDEO source for cta"}
    - {asset_id: RAW_001, filename: 01_hook.MOV, external_uri: null, sha256: null, notes: "HLG HDR; hook — never discover (16.57s)"}
    - {asset_id: RAW_002, filename: 02_why.MOV, external_uri: null, sha256: null, notes: "HLG HDR; why DirtBikeX (8.63s)"}
    - {asset_id: RAW_003, filename: 03_flair.MOV, external_uri: null, sha256: null, notes: "HLG HDR; feature 1 verified track owner (7.03s)"}
    - {asset_id: RAW_004, filename: 04_create.MOV, external_uri: null, sha256: null, notes: "HLG HDR; feature 2 create events (5.60s)"}
    - {asset_id: RAW_005, filename: 05_rsvp.MOV, external_uri: null, sha256: null, notes: "HLG HDR; feature 3 events tab / RSVP (8.57s)"}
    - {asset_id: RAW_006, filename: 06_cta.MOV, external_uri: null, sha256: null, notes: "HLG HDR; close + comment OWNER (12.33s)"}
    - {asset_id: RAW_007, filename: 07_screen-flair.mov, external_uri: null, sha256: null, notes: "screen rec 884x1920; profile → flair → Track Stewards (8.60s)"}
    - {asset_id: RAW_008, filename: 08_screen-create.mov, external_uri: null, sha256: null, notes: "screen rec 1170x2532; New Event, incl. ~9s editor loading (58.45s)"}
    - {asset_id: RAW_009, filename: 09_screen-rsvp.mp4, external_uri: null, sha256: null, notes: "screen rec 1170x2532; Events tab → RSVP, incl. map loading (15.63s)"}
  # Narration selects = speech-end trims (silencedetect). Screen-recording chops are
  # multi-segment pure cuts — spec + reproduction in screen-chop.sh.
  selected:
    - {asset_id: SEL_001, source_asset_id: RAW_001, in: "00:00:00.000", out: "00:00:15.480", beat: hook}
    - {asset_id: SEL_002, source_asset_id: RAW_002, in: "00:00:00.210", out: "00:00:07.760", beat: why}
    - {asset_id: SEL_003, source_asset_id: RAW_003, in: "00:00:00.350", out: "00:00:06.270", beat: flair}
    - {asset_id: SEL_004, source_asset_id: RAW_004, in: "00:00:00.000", out: "00:00:05.060", beat: create}
    - {asset_id: SEL_005, source_asset_id: RAW_005, in: "00:00:00.000", out: "00:00:07.970", beat: rsvp}
    - {asset_id: SEL_006, source_asset_id: RAW_006, in: "00:00:00.000", out: "00:00:11.630", beat: cta}
  voiceover: [] # narration embedded in the talking-head clips
  audio:
