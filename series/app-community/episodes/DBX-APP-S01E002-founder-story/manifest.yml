# Schema notes: docs/production-model.md · naming: docs/naming-conventions.md
# Validate with: node tools/validate.mjs

video_id: "DBX-APP-S01E002" # DBX-{SERIES}-S{ss}E{eee}
slug: "founder-story"
series: "app-community"
status: editing # topic|packaging|scripting|shooting|editing|qc|published|retro
# Rough cut assembled (kdenlive-build.repl → founder-story.kdenlive). Human polishes
# zoom keyframes + final timing on the Mac, then renders. See edit-notes.md.

formats:
  primary: short_vertical
  aspect: 9x16
  resolution: 1080x1920
  fps: 30

# Longer, story-driven cut of the SAME topic as E001 (why DirtBikeX exists) — a
# different presentation form, not a re-edit. en-US first.
# Script is LOCKED (recorded: 6 talking-head clips, HLG HDR). Raw ~69.7s; edit target ~60s.
# Edit plan in storyboard.md; awaiting go-ahead before threading/render.
variants:
  en-US:
    script: script.en-US.md
    cover: cover.en-US.md
    subtitles: subtitles/en-US.srt
    remotion_props: remotion-props/en-US.json
    voiceover_asset_id: null # narration is diegetic in the talking-head clips (no separate VO file)
    platforms: [tiktok, ytshorts, reels]

# Beats are the recorded narration clips, in order. overlay = primary Remotion comp:
# kinetic-captions = the streaming color-emphasis captions (one per beat). Branded
# overlays (brand-title, invite-card, profile-card) are secondary — see edit-notes.md.
beats:
  - id: hook
    purpose: first-second grab; name the real problem (belonging, not skill)
    visual_intent: founder to camera, open mid-punch-in; snap-in on "gets it"
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 7.0
  - id: first-ride
    purpose: vivid physical low; earn the story, relatable not heroic
    visual_intent: escalating small push-ins on each hardship
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 10.0
  - id: addictive
    purpose: the turn — hardship to love to the point of sharing
    visual_intent: pull-out on release, punch-in on "addictive" / "share it with"
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 10.0
  - id: problem
    purpose: name the gap the product fills (scattered/outdated), briefly
    visual_intent: near-static, colder; glitch captions on "scattered"/"outdated"
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 6.5
  - id: built-it
    purpose: solution + features in the founder's own hands (seasoning, not montage)
    visual_intent: punch-in on "DirtBikeX"; 3 light UI flashes (no-bloat/embed/languages)
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 14.0
  - id: cta
    purpose: turn the story into one action — grab the invite code
    visual_intent: warm settle; invite-card on "invite code", profile-card on "My name is Rubio"
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 12.0

