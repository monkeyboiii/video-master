    - {asset_id: RAW_007, filename: 07_splash.MOV, external_uri: null, sha256: null, notes: "HLG HDR; splash screen, pause, tap, profile (6.67s)"}
    - {asset_id: RAW_008, filename: 08_capped.MOV, external_uri: null, sha256: null, notes: "HLG HDR; capped and rotated (6.83s)"}
    - {asset_id: RAW_009, filename: 09_stats.MOV, external_uri: null, sha256: null, notes: "HLG HDR; sponsorship stats, regional exposure, daily trends (7.07s)"}
    - {asset_id: RAW_010, filename: 10_cta.MOV, external_uri: null, sha256: null, notes: "HLG HDR; fair way to get seen, Rubio, comment PASS (9.90s)"}
