# Episode manifest — source of truth for this episode.
# Schema notes: docs/production-model.md · naming: docs/naming-conventions.md
# Validate with: node tools/validate.mjs

video_id: "DBX-APP-S01E004" # DBX-{SERIES}-S{ss}E{eee}
slug: "sponsorship-passes"
series: "app-community"
status: editing # topic|packaging|scripting|shooting|editing|qc|published|retro

formats:
  primary: short_vertical
  aspect: 9x16
  resolution: 1080x1920
  fps: 30

# How DirtBikeX's sponsorship "passes" work. Narration was recorded first — there is NO authored
# reading script; script.en-US.md is the transcript of record and the .srt files are the
# subtitles. Director's outline (incl. the [SCREEN: ...] overlay directives): rough.md.
# Raw ~75.2s; both-edge pause-cropped timeline = 66.25s. Edit plan in storyboard.md.
variants:
  en-US:
    script: script.en-US.md
    cover: cover.en-US.md
    subtitles: subtitles/en-US.srt
    # No single locale props file: this episode renders per-comp props
    # (remotion-props/captions.all.json, brand-drop.json, side-screen.*.json, ...).
    remotion_props: null
    voiceover_asset_id: null # narration is diegetic in the talking-head clips
    platforms: [tiktok, ytshorts, reels]

# One continuous caption overlay spans the whole video, so each beat's `overlay` below names
# that beat's *distinctive* overlay. Durations are the pause-cropped cut lengths.
beats:
  - id: hook
    purpose: state the contradiction — ad slots built by someone who hates ads
    visual_intent: founder to camera; brand-drop surfaces on "DirtBikeX" (@7.33) then retires to the top-right corner as an icon
    overlay: brand-drop
    target_duration_sec:
      en-US: 9.79
  - id: hate-ads
    purpose: earn the hook with a real confession (looking away from ads)
    visual_intent: small push-in; no overlay — the face carries it
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 4.88
  - id: billboard
    purpose: name the thing he refuses to build
    visual_intent: near-static, colder; radio-static on "billboard"
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 4.94
  - id: passes
    purpose: the pivot — limited passes for riders who belong
    visual_intent: slight pull-out; still no UI, let the idea land
    overlay: kinetic-captions
    target_duration_sec:
      en-US: 5.84
  - id: sponsorship
    purpose: the how — Sponsorship page, pick a spot, set start + duration
    visual_intent: top-left screen card (11_screen-sponsorship)
    overlay: side-screen
    target_duration_sec:
      en-US: 7.64
  - id: discovery
    purpose: placement breadth — search, chat, filter
    visual_intent: three top-left cards fanning out in sequence, one per placement
    overlay: side-screen
    target_duration_sec:
      en-US: 5.25
  - id: splash
    purpose: the marquee placement — splash card, pause, tap, profile
    visual_intent: top-left screen card; pause -> tap -> profile each legible
    overlay: side-screen
    target_duration_sec:
      en-US: 6.19
  - id: capped
    purpose: objection-handler — capped and rotated, nobody floods the app
    visual_intent: top-left screen card (16_screen-capped)
    overlay: side-screen
    target_duration_sec:
      en-US: 6.08
  - id: stats
    purpose: proof it is measurable — regional exposure, daily trends
    visual_intent: top-left screen card, hold the final chart
    overlay: side-screen
    target_duration_sec:
      en-US: 6.20
  - id: cta
    purpose: one action — comment "PASS" for a free day pass
    visual_intent: profile-card enters 0.29s BEFORE "My name is Rubio", on the subtitle side (E003 convention), gone 0.78s before "Comment"
    overlay: profile-card
    target_duration_sec:
      en-US: 9.44

assets:
  # 10 talking-head clips (HLG HDR, 1920x1080 coded + -90 rotation -> 1080x1920 portrait) and
  # 7 app screen recordings (SDR).
  #
  # THIS CUT TAKES ITS VIDEO FROM enhanced/ AND ITS AUDIO FROM THE .MOV. The enhanced renders
  # (ENH_001..010, media/DBX-APP-S01E004/enhanced/) are already SDR bt709, upright 1080x1920,
  # 30fps, no rotation matrix: do NOT tone-map or transpose them. They are frame-synced to their
  # .MOV (10x10 RMS-envelope cross-correlation: corr 0.996-0.999, next-best 0.23-0.40, 0ms lag;
  # decoded frame counts agree on 9 of 10, 01_hook being one frame short at a tail we never use).
  # Each .MOV carries a second, undecodable 4.0 'apac' spatial audio track — map 0:a:0, never 0:a.
  raw:
    - {asset_id: RAW_001, filename: 01_hook.mov, external_uri: null, sha256: null, notes: "HLG HDR; ad slots / hate ads / DirtBikeX full of flyers (12.11s)"}
