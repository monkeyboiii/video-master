    platforms: [tiktok, ytshorts, reels]

# Added at the scripting stage. Beat IDs are stable slugs; every script line
# belongs to one beat. `overlay` names a composition in packages/remotion-graphics
# (hook-title | checklist-card | cta-card | lower-third | subtitle-track | stage-cards) or null.
beats:
  - id: pov-without-suit
    purpose: hook; land the premise in the first second with zero setup
    visual_intent: 'desk coding in ordinary clothes under the source caption "Pov: without the suit"'
    overlay: null
    target_duration_sec:
      en-US: 5.433
  - id: pov-with-suit
    purpose: the joke; identical work, full race kit
    visual_intent: same desk and framing in full MX gear, "Compiled!" beat lands ~9.4
    overlay: null
    target_duration_sec:
      en-US: 8.134
  - id: suit-up-rush
    purpose: raise energy into the brand section
    visual_intent: 0.2-0.3s stutter cuts standing up and turning to camera; deliberately clean
    overlay: null
    target_duration_sec:
      en-US: 2.200
  - id: palm-push-trace
    purpose: hand the viewer the mark
    visual_intent: arm pushes to camera; orange X rides the hand and settles in the open palm
    overlay: null
    target_duration_sec:
      en-US: 0.966
  - id: palm-zoom-x
    purpose: the mark arrives full size without becoming a different mark
    visual_intent: palm fills frame; the same X scales proportionally with the palm
    overlay: null
    target_duration_sec:
      en-US: 0.834
  - id: corner-callouts
    purpose: keep the eye moving across the frame on the beat
    visual_intent: white-outlined rider points; an orange X lands sequentially at each corner
    overlay: null
    target_duration_sec:
      en-US: 3.033
  - id: clap-logo-expand
    purpose: brand reveal earned by a physical action
    visual_intent: clap, then the DirtBikeX wordmark presents and expands in two steps locked to the hands opening
    overlay: null
    target_duration_sec:
      en-US: 1.350
  - id: full-throttle-fists
    purpose: payoff energy; source caption owns the frame
    visual_intent: fists pushed to camera under "Zenkai! Full throttle!"; no added overlay
    overlay: null
    target_duration_sec:
      en-US: 4.350
  - id: brand-lockup
    purpose: close on brand plus founder identity
    visual_intent: hands drop; DirtBikeX wordmark above the helmet and the Rubio profile card
    overlay: null
    target_duration_sec:
      en-US: 0.833
