# Added at the scripting stage. Beat IDs are stable slugs; every script line
# belongs to one beat. `overlay` names a composition in packages/remotion-graphics
# (hook-title | checklist-card | cta-card | lower-third | subtitle-track | stage-cards) or null.
beats:
  - id: hook
    purpose: pain point — the 450 trap the viewer is about to fall into
    visual_intent: ankle-height shot, rider on tiptoes wobbling on a tall MX bike at a stop — same setup as the cover first frame; hook-title punches in on the key word (en "450", zh "买大了")
    overlay: hook-title
    target_duration_sec:
      en-US: 3.0
      zh-CN: 2.5
  - id: problem
    purpose: viewer recognizes themselves — too much bike ends in a garage ornament
    visual_intent: quick cuts of tiptoe stall and near-tip-over save, then dusty bike under a tarp
    overlay: null
    target_duration_sec:
      en-US: 6.0
      zh-CN: 5.0
  - id: conclusion
    purpose: core conclusion stated early — fit and control beat power / 座高＞排量
    visual_intent: rider plants both feet flat on a mid-size trail bike, relaxed; text card mirrors the spoken line (zh — 座高＞排量)
    overlay: null
    target_duration_sec:
      en-US: 5.0
      zh-CN: 4.5
  - id: point-1
    purpose: decision rule 1 — flat-feet seat-height test
    visual_intent: split-screen feet close-up, flat vs tiptoes, green check / red cross
    overlay: null
    target_duration_sec:
      en-US: 7.0
      zh-CN: 6.0
  - id: point-2
    purpose: decision rule 2 — used 4-stroke 230–250 trail class, not an MX bike
    visual_intent: mellow-trail b-roll (slow follow) of a 250-class trail bike (en — CRF250F), lower-third labels model and class
    overlay: lower-third
    target_duration_sec:
      en-US: 7.0
      zh-CN: 6.0
  - id: point-3
    purpose: decision rule 3 — budget split so gear is never sacrificed for the bike
    visual_intent: split-bar budget graphic over gear laid out on a table — helmet, boots, gloves, knee guards (en adds goggles, zh adds 护甲)
    overlay: null
    target_duration_sec:
      en-US: 7.0
      zh-CN: 6.0
  - id: experience
    purpose: proof — the human's true wrong-first-bike story (HUMAN placeholder in scripts)
    visual_intent: real photo of the actual first bike, match-cut to current riding footage
    overlay: null
    target_duration_sec:
      en-US: 7.0
      zh-CN: 6.0
  - id: checklist
    purpose: the saveable artifact — 5-item buying checklist
    visual_intent: checklist card carries the beat, items tick in one by one, voiceover pauses under the card
    overlay: checklist-card
    target_duration_sec:
      en-US: 8.0
      zh-CN: 7.0
  - id: cta
    purpose: one action (save) plus follow expectation — next episode on beginner gear
    visual_intent: CTA card with @dirtbikex handle over freeze-frame of relaxed flat-foot thumbs-up
    overlay: cta-card
    target_duration_sec:
      en-US: 4.0
      zh-CN: 3.5

